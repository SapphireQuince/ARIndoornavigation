<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Codes – Indoor Navigation</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { background: #f4f6fa; font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #1565C0; margin-bottom: 6px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
        .qr-grid {
            display: flex; flex-wrap: wrap; gap: 24px;
            justify-content: center; max-width: 900px; margin: 0 auto;
        }
        .qr-card {
            background: #fff; border: 2px solid #e0e0e0; border-radius: 12px;
            padding: 20px; text-align: center; width: 240px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            page-break-inside: avoid;
        }
        .qr-card img { width: 180px; height: 180px; object-fit: contain; }
        .qr-card h3 { margin: 12px 0 4px; color: #1565C0; font-size: 16px; }
        .qr-card .desc { font-size: 12px; color: #888; }
        .back-link {
            display: block; text-align: center; margin-bottom: 20px;
            color: #1565C0; text-decoration: none; font-size: 14px;
        }
        @media print { .back-link { display: none; } }
    </style>
</head>
<body>
    <a class="back-link" href="/">← Back to Home</a>
    <h1>🖨️ QR Codes for Entrances</h1>
    <p class="subtitle">Print and place these at the respective building entrances.</p>

    <div class="qr-grid">
        {% for entrance_id, info in entrances.items() %}
        <div class="qr-card">
            <img src="{{ url_for('main.qr_code_image', filename='entrance_' ~ entrance_id ~ '.png') }}"
                 alt="QR Code for Entrance {{ entrance_id }}">
            <h3>{{ info.name }}</h3>
            <p class="desc">{{ info.description }}</p>
        </div>
        {% endfor %}
    </div>
</body>
</html>
