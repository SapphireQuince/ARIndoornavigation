<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Indoor Navigation</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1><span style="font-size: 28px;">🌐</span> Indoor Navigation</h1>
            <p>Smart AR-guided navigation system</p>
        </header>

        <div class="entrance-card">
            <h2>📍 {{ entrance_info.name }}</h2>
            <p>{{ entrance_info.description }}</p>
            <span class="badge">Entrance #{{ entrance_id }}</span>
        </div>

        <h3 class="section-title">Where would you like to go?</h3>

        <div class="destinations-grid">
            {% for dest in destinations %}
            <a href="{{ url_for('main.navigate', destination=dest, entrance=entrance_id) }}" class="destination-btn">
                <span class="destination-icon">📍</span>
                <span>{{ dest }}</span>
            </a>
            {% endfor %}
        </div>
    </div>
</body>
</html>
